      <rect x="753.3" y="566.0" width="126.0" height="16" rx="3" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8"/>
      <text x="816.3" y="577.5" text-anchor="middle" font-size="9.5" font-weight="600" fill="#334155">heurística (default)</text>
