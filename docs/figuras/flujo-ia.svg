  <rect x="0" y="0" width="1180" height="1690" fill="#FFFFFF"/>
  <text x="590" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#001F5B">Pipeline de clasificación de actividades con NLP (BETO)</text>
  <text x="590" y="60" text-anchor="middle" font-size="13" fill="#6B7280">Cloud Function 'clasificar' (Python) — preprocesamiento, clasificación, confirmación humana y reentrenamiento</text>
  
