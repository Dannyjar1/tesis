      <rect x="-16.7" y="1626.0" width="143.4" height="16" rx="3" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8"/>
      <text x="55.0" y="1637.5" text-anchor="middle" font-size="9.5" font-weight="600" fill="#334155">redespliegue del modelo</text>
  <rect x="380" y="70" width="440" height="52" rx="26" fill="#E8F0FE" stroke="#003087" stroke-width="1.6"/>
<text x="600" y="92.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Usuario redacta el texto de la actividad/evento</text>
<text x="600" y="107.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">(título + descripción)</text>
<polygon points="378,150 840,150 822,210 360,210" fill="#EEF6FF" stroke="#0057B7" stroke-width="1.6"/>
<text x="600" y="176.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">POST /clasificar</text>
<text x="600" y="191.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">{ texto, evento_id, docente_uid, periodo_id } + Firebase ID token</text>
<polygon points="600,244 705,292 600,340 495,292" fill="#FFF7E6" stroke="#E8500A" stroke-width="1.6"/>
<text x="600" y="288.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">¿texto válido</text>
<text x="600" y="303.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">(no vacío)?</text>
<rect x="905" y="268" width="220" height="50" rx="25" fill="#FDECEC" stroke="#DC2626" stroke-width="1.6"/>
<text x="1015" y="289.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">HTTP 400</text>
<text x="1015" y="304.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Campo 'texto' requerido</text>
<rect x="360" y="376" width="480" height="66" rx="8" fill="#FFFFFF" stroke="#0057B7" stroke-width="1.6"/>
<text x="600" y="405.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Preprocesamiento</text>
<text x="600" y="420.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">minúsculas · normalización Unicode (NFKD) · limpieza de caracteres</text>
<polygon points="600,478 715,528 600,578 485,528" fill="#FFF7E6" stroke="#E8500A" stroke-width="1.6"/>
<text x="600" y="532" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">CLASIFICADOR_MODO</text>
<rect x="95" y="622" width="380" height="140" rx="8" fill="#DCE7FB" stroke="#003087" stroke-width="2.4"/>
<text x="285" y="667" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1F2937">BETO fine-tuned (español)</text>
<text x="285" y="681.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">dccuchile/bert-base-spanish-wwm-cased</text>
<text x="285" y="696" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">AutoModelForSequenceClassification</text>
<text x="285" y="710.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">(Transformer + capa softmax)</text>
<text x="285" y="725" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">tokeniza (máx. 128) → logits → softmax → argmax</text>
<polygon points="285,800 395,848 285,896 175,848" fill="#FFF7E6" stroke="#E8500A" stroke-width="1.6"/>
<text x="285" y="844.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">¿BETO disponible?</text>
<text x="285" y="859.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">(torch / modelo / memoria)</text>
<rect x="730" y="622" width="375" height="140" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.6"/>
<text x="917.5" y="667" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Clasificador heurístico</text>
<text x="917.5" y="681.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">(modo por defecto / fallback)</text>
<text x="917.5" y="696" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">keywords × pesos → normaliza → argmax</text>
<text x="917.5" y="710.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">sin señal → 'gestión' (conf. 0.58)</text>
<text x="917.5" y="725" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">confianza ∈ [0.58, 0.97]</text>
<rect x="370" y="930" width="460" height="64" rx="8" fill="#FFFFFF" stroke="#0057B7" stroke-width="1.6"/>
<text x="600" y="958.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Resultado provisional</text>
<text x="600" y="973.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">{ categoria, confianza, probabilidades, motor }</text>

      <path d="M360,1039 a240,9 0 0 1 480,0 v78 a240,9 0 0 1 -480,0 Z"
        fill="#EAF6EF" stroke="#13633A" stroke-width="1.6"/>
      <path d="M360,1039 a240,9 0 0 0 480,0" fill="none" stroke="#13633A" stroke-width="1.6"/>
<text x="600" y="1067.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Persistencia en Cloud Firestore</text>
<text x="600" y="1082" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">/clasificaciones_ia  (estado = 'provisional')</text>
<text x="600" y="1096.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">evento → estado_clasificacion = 'provisional'</text>
<polygon points="378,1158 840,1158 822,1216 360,1216" fill="#EEF6FF" stroke="#0057B7" stroke-width="1.6"/>
<text x="600" y="1191" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">HTTP 200 → el frontend muestra la sugerencia provisional</text>
<polygon points="600,1252 720,1306 600,1360 480,1306" fill="#FFF7E6" stroke="#E8500A" stroke-width="1.6"/>
<text x="600" y="1295.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">El usuario (director/</text>
<text x="600" y="1310" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">coordinador) revisa:</text>
<text x="600" y="1324.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">¿categoría correcta?</text>
<rect x="760" y="1272" width="345" height="70" rx="8" fill="#EAF6EF" stroke="#13633A" stroke-width="1.6"/>
<text x="932.5" y="1303.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Confirmar</text>
<text x="932.5" y="1318.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">evento.estado_clasificacion = 'confirmada'</text>
<rect x="95" y="1262" width="380" height="96" rx="8" fill="#FDEFE8" stroke="#E8500A" stroke-width="1.6"/>
<text x="285" y="1299.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Corrección manual</text>
<text x="285" y="1314" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">categoria_corregida · fue_corregida = true</text>
<text x="285" y="1328.5" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">guarda registro en /feedback</text>
<rect x="470" y="1410" width="260" height="50" rx="25" fill="#E8F0FE" stroke="#003087" stroke-width="1.6"/>
<text x="600" y="1439" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Fin: clasificación confirmada</text>
<rect x="110" y="1540" width="300" height="72" rx="8" fill="#F5F7FA" stroke="#13633A" stroke-width="1.6"/>
<text x="260" y="1572.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">generar_dataset.py</text>
<text x="260" y="1587.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">/feedback → dataset_beto.csv (etiquetado)</text>
<rect x="450" y="1540" width="350" height="72" rx="8" fill="#F5F7FA" stroke="#13633A" stroke-width="1.6"/>
<text x="625" y="1572.75" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">entrenar.py · fine-tuning de BETO</text>
<text x="625" y="1587.25" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">4 epochs · lr 2e-5 · meta F1 ≥ 0.80</text>

      <path d="M840,1549 a127.5,9 0 0 1 255,0 v54 a127.5,9 0 0 1 -255,0 Z"
        fill="#EAF6EF" stroke="#13633A" stroke-width="1.6"/>
      <path d="M840,1549 a127.5,9 0 0 0 255,0" fill="none" stroke="#13633A" stroke-width="1.6"/>
<text x="967.5" y="1580" text-anchor="middle" font-size="11.5" font-weight="400" fill="#1F2937">Modelo → Cloud Storage</text>

