      <rect x="316.7" y="920.0" width="21.6" height="16" rx="3" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.8"/>
      <text x="327.5" y="931.5" text-anchor="middle" font-size="9.5" font-weight="600" fill="#334155">Sí</text>
<path d="M917.5,762 L830,962" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#ar)"/>
<path d="M600,994 L600,1030" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#ar)"/>
