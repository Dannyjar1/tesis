<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="850" viewBox="0 0 1160 850" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="850" fill="#FFFFFF"/>

  <!-- Título -->
  <text x="580" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#001F5B">Arquitectura general del sistema — UIDE Distributivo</text>
  <text x="580" y="58" text-anchor="middle" font-size="13.5" fill="#6B7280">Aplicación web serverless de tres capas (Firebase) · Proyecto uide-distributivo-loja · región us-central1</text>

  <!-- ================= CAPA 1 — PRESENTACIÓN ================= -->
  <rect x="40" y="80" width="1080" height="184" rx="12" fill="#EAF1FC" stroke="#0057B7" stroke-width="1.5"/>
  <text x="62" y="110" font-size="16" font-weight="700" fill="#003087">CAPA DE PRESENTACIÓN — Frontend (navegador del usuario)</text>

  <!-- Box 1.1 -->
  <rect x="60" y="128" width="246" height="116" rx="8" fill="#FFFFFF" stroke="#C7D2E0" stroke-width="1.2"/>
  <text x="74" y="154" font-size="14" font-weight="700" fill="#0057B7">Aplicación React (SPA)</text>
  <text x="74" y="178" font-size="11.5" fill="#374151">React 19 · Vite 8</text>
  <text x="74" y="196" font-size="11.5" fill="#374151">Tailwind CSS 3</text>
  <text x="74" y="214" font-size="11.5" fill="#374151">React Router 7</text>

  <!-- Box 1.2 -->
  <rect x="324" y="128" width="246" height="116" rx="8" fill="#FFFFFF" stroke="#C7D2E0" stroke-width="1.2"/>
  <text x="338" y="154" font-size="14" font-weight="700" fill="#0057B7">Dashboard / Visualización</text>
  <text x="338" y="178" font-size="11.5" fill="#374151">Recharts</text>
  <text x="338" y="196" font-size="11.5" fill="#374151">(gráficos de cumplimiento</text>
  <text x="338" y="214" font-size="11.5" fill="#374151">en tiempo real)</text>

  <!-- Box 1.3 -->
  <rect x="588" y="128" width="246" height="116" rx="8" fill="#FFFFFF" stroke="#C7D2E0" stroke-width="1.2"/>
  <text x="602" y="154" font-size="14" font-weight="700" fill="#0057B7">Reportes en el cliente</text>
  <text x="602" y="178" font-size="11.5" fill="#374151">pdfmake + qrcode (PDF)</text>
  <text x="602" y="196" font-size="11.5" fill="#374151">SheetJS / xlsx (Excel)</text>
  <text x="602" y="214" font-size="11.5" fill="#374151">Distributivo + reportes</text>

  <!-- Box 1.4 -->
  <rect x="852" y="128" width="246" height="116" rx="8" fill="#FFFFFF" stroke="#C7D2E0" stroke-width="1.2"/>
  <text x="866" y="154" font-size="14" font-weight="700" fill="#0057B7">Firebase Hosting</text>
  <text x="866" y="178" font-size="11.5" fill="#374151">Entrega la SPA compilada</text>
  <text x="866" y="196" font-size="11.5" fill="#374151">(carpeta dist/)</text>
  <text x="866" y="214" font-size="11.5" fill="#6B7280">SPA rewrites → index.html</text>

  <!-- ================= CAPA 2 — LÓGICA DE NEGOCIO ================= -->
  <rect x="40" y="320" width="1080" height="184" rx="12" fill="#FDEFE8" stroke="#E8500A" stroke-width="1.5"/>
  <text x="62" y="350" font-size="16" font-weight="700" fill="#B23C06">CAPA DE LÓGICA DE NEGOCIO — Backend (Firebase Cloud Functions · Python 3.11)</text>

  <!-- Box 2.1 (activa) -->
  <rect x="60" y="368" width="330" height="116" rx="8" fill="#FFFFFF" stroke="#E8500A" stroke-width="1.8"/>
  <text x="74" y="394" font-size="14" font-weight="700" fill="#B23C06">Cloud Function: clasificar (HTTPS)</text>
  <text x="74" y="416" font-size="11.5" fill="#374151">Clasificación NLP de actividades (MOD-04)</text>
  <text x="74" y="434" font-size="11.5" fill="#374151">Heurística por keywords (por defecto)</text>
  <text x="74" y="452" font-size="11.5" fill="#374151">BETO opcional (fine-tuned):</text>
  <text x="74" y="470" font-size="11.5" fill="#6B7280">dccuchile/bert-base-spanish-wwm-cased</text>

  <!-- Box 2.2 (runtime) -->
  <rect x="414" y="368" width="330" height="116" rx="8" fill="#FFFFFF" stroke="#C7D2E0" stroke-width="1.2"/>
  <text x="428" y="394" font-size="14" font-weight="700" fill="#B23C06">Runtime Cloud Functions</text>
  <text x="428" y="418" font-size="11.5" fill="#374151">Python 3.11</text>
  <text x="428" y="436" font-size="11.5" fill="#374151">firebase-functions</text>
  <text x="428" y="454" font-size="11.5" fill="#374151">firebase-admin (acceso a Firestore)</text>

  <!-- Box 2.3 (previstos, dashed) -->
  <rect x="768" y="368" width="330" height="116" rx="8" fill="#FFFFFF" stroke="#9AA3AF" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="782" y="394" font-size="14" font-weight="700" fill="#6B7280">Módulos previstos (no desplegados)</text>
  <text x="782" y="418" font-size="11.5" fill="#6B7280">Reportes server-side:</text>
  <text x="782" y="436" font-size="11.5" fill="#6B7280">reportlab · openpyxl</text>
  <text x="782" y="458" font-size="11.5" fill="#6B7280">Notificaciones: email</text>

  <!-- ================= CAPA 3 — PERSISTENCIA ================= -->
  <rect x="40" y="556" width="1080" height="184" rx="12" fill="#EAF6EF" stroke="#1B7F4B" stroke-width="1.5"/>
  <text x="62" y="586" font-size="16" font-weight="700" fill="#13633A">CAPA DE PERSISTENCIA — Datos e identidad (Firebase)</text>

  <!-- Box 3.1 Firestore -->
  <rect x="60" y="604" width="330" height="116" rx="8" fill="#FFFFFF" stroke="#C7D2E0" stroke-width="1.2"/>
  <text x="74" y="630" font-size="14" font-weight="700" fill="#13633A">Cloud Firestore</text>
  <text x="74" y="654" font-size="11.5" fill="#374151">Base de datos NoSQL en tiempo real</text>
  <text x="74" y="672" font-size="11.5" fill="#374151">Colecciones: usuarios, distributivos,</text>
  <text x="74" y="690" font-size="11.5" fill="#374151">actividades, periodos, reportes…</text>
  <text x="74" y="708" font-size="11.5" fill="#6B7280">Reglas de seguridad + índices</text>

  <!-- Box 3.2 Storage -->
  <rect x="414" y="604" width="330" height="116" rx="8" fill="#FFFFFF" stroke="#C7D2E0" stroke-width="1.2"/>
  <text x="428" y="630" font-size="14" font-weight="700" fill="#13633A">Cloud Storage</text>
  <text x="428" y="654" font-size="11.5" fill="#374151">Almacenamiento de archivos</text>
  <text x="428" y="672" font-size="11.5" fill="#374151">Evidencias de actividades</text>
  <text x="428" y="690" font-size="11.5" fill="#374151">(adjuntos subidos por docentes)</text>

  <!-- Box 3.3 Auth -->
  <rect x="768" y="604" width="330" height="116" rx="8" fill="#FFFFFF" stroke="#C7D2E0" stroke-width="1.2"/>
  <text x="782" y="630" font-size="14" font-weight="700" fill="#13633A">Firebase Authentication</text>
  <text x="782" y="654" font-size="11.5" fill="#374151">Identidad y sesión de usuarios</text>
  <text x="782" y="672" font-size="11.5" fill="#374151">Control de acceso por rol</text>
  <text x="782" y="690" font-size="11.5" fill="#374151">(superadmin, director,</text>
  <text x="782" y="708" font-size="11.5" fill="#374151">coordinador, docente)</text>

  <!-- ================= FLECHAS ================= -->
  <!-- SPA -> Cloud Function (HTTPS, req/resp) -->
  <line x1="183" y1="244" x2="183" y2="368" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <rect x="196" y="288" width="150" height="34" rx="5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="271" y="303" text-anchor="middle" font-size="10.5" fill="#334155">HTTPS (petición /</text>
  <text x="271" y="316" text-anchor="middle" font-size="10.5" fill="#334155">respuesta · categoría)</text>

  <!-- Cloud Function -> Firestore (admin SDK) -->
  <line x1="183" y1="484" x2="183" y2="604" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="196" y="528" width="150" height="34" rx="5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="271" y="543" text-anchor="middle" font-size="10.5" fill="#334155">firebase-admin</text>
  <text x="271" y="556" text-anchor="middle" font-size="10.5" fill="#334155">(lectura/escritura)</text>

  <!-- Canal directo SPA -> capa de datos (Firebase SDK), por el margen derecho -->
  <path d="M 1100 186 L 1135 186 L 1135 662 L 1100 662" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="1149" y="424" text-anchor="middle" font-size="11" font-weight="600" fill="#334155" transform="rotate(90 1149 424)">Firebase SDK (cliente):  Firestore (onSnapshot/CRUD) · Authentication · Storage</text>

  <!-- ================= LEYENDA ================= -->
  <rect x="40" y="766" width="1080" height="66" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="62" y="784" width="26" height="16" rx="3" fill="#FFFFFF" stroke="#E8500A" stroke-width="1.8"/>
  <text x="98" y="797" font-size="12" fill="#374151">Componente desplegado / activo</text>
  <rect x="312" y="784" width="26" height="16" rx="3" fill="#FFFFFF" stroke="#9AA3AF" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="348" y="797" font-size="12" fill="#374151">Componente previsto / no desplegado</text>
  <line x1="640" y1="792" x2="690" y2="792" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="700" y="797" font-size="12" fill="#374151">Flujo de datos / invocación</text>
  <text x="62" y="822" font-size="11" fill="#6B7280">Autenticación: Firebase Authentication.  ·  El frontend accede directamente a Firestore/Storage/Auth vía SDK; la lógica NLP corre en una Cloud Function (Python).</text>
</svg>
